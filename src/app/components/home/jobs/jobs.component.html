<section class="section jobs" id='jobs'>
  @defer (on viewport) {
  <div class="container">
    <div class="section-box">
      <div class="about-title mb-4" data-aos="fade-up" data-aos-duration="1000">
        <h3 class="e-font section-title">
          <span class='code-font n-section-title'>02.</span> {{"Experience.Title" | translate}}
        </h3>
      </div>

      <div class="jobs-tabs" data-aos="fade-up" data-aos-duration="1000">
        <div class="jobs-categories-centered">
          @for (cat of categorizeJobs(("Experience.Jobs" | translate)); track cat; let idx = $index) {
            <div class="jobs-category-group">
              <div class="image-grid">
                @for (job of cat.items; track job; let i = $index) {
                    <div [title]="job.Tab">
                    <div (click)="openLink(job.Date)" [title]="job.Date">
                      <div class="img-background" [style.background-image]="getBackgroundImage(job.imageUrl)"></div>
                    </div>
                    <div class="company-tab-content" [title]="job.Title">{{job.Tab}}</div>
                  </div>
                }
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
  } @placeholder {
  <div>Me interesa...</div>
}

  <div class="container">
    <div class="section-box">
      <div class="about-title mb-4" data-aos="fade-up" data-aos-duration="1000">
        <h3 class="e-font section-title">
          <span class='code-font n-section-title'>03.</span> Me interesa la cotización
        </h3>
      </div>
      <div class="tradingview-widgets">
        <div class="tradingview-widget-container" #btcWidget>
          <div class="tradingview-widget-container__widget"></div>
        </div>
        <div class="tradingview-widget-container" #mstrWidget>
          <div class="tradingview-widget-container__widget"></div>
        </div>
      </div>
    </div>
  </div>
</section>
