<section class="section contact fade-in" id='contact'>
    @defer (on viewport) {
        <div class="container">
            <div class="section-box-contact">
                <div class="content">
                    <div class="mb-4" data-aos="fade-up" data-aos-duration="1000">
                        <h3 class="contact-pre-title big-subtitle">04. {{"Contact.Pretitle" | translate}}</h3>
                        <h4 class="e-font contact-title big-titl">
                            {{"Contact.Title" | translate}}
                        </h4>
                    </div>
                    <p data-aos="fade-up" data-aos-duration="1200">
                        {{"Contact.Content" | translate}}
                    </p>
                    <div class="mt-1" data-aos="fade-up" data-aos-duration="1400">
                        <a href="mailto:alex-vicente.dev.lyricist910@passmail.net" target="_blank" class="main-btn" data-aos="fade-up" data-aos-duration="1000">
                        <i class="fas fa-envelope"></i> {{"Contact.Btn" | translate}}
                        </a>

                        <a href="https://www.linkedin.com/in/alexvicente/" target="_blank" class="main-btn" data-aos="fade-up" data-aos-duration="1000">
                        <i class="fab fa-linkedin-in"></i> {{"Contact.Btnlinkedin" | translate}}
                        </a>
                    </div>
                </div>
            </div>
        </div>
    } @placeholder {
        <div>Contacto...</div>
    }
</section>
